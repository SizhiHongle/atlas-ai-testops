name: atlas-testops

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas_owner
      POSTGRES_PASSWORD: atlas_owner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_owner -d atlas"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - atlas-postgres:/var/lib/postgresql
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro

  temporal:
    image: temporalio/temporal:1.8.0
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--ui-ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "127.0.0.1:7233"]
      interval: 3s
      timeout: 5s
      retries: 30

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: atlas_minio
      MINIO_ROOT_PASSWORD: atlas_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - atlas-minio:/data

  auth-session-worker:
    build:
      context: ./backend
      target: auth-session-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_AUTH_SESSION_TASK_QUEUE: atlas-auth-session
      ATLAS_AUTH_SESSION_WORKER_MAX_CONCURRENCY: 4
      ATLAS_SESSION_OBJECT_STORE_ENDPOINT: minio:9000
      ATLAS_SESSION_OBJECT_STORE_ACCESS_KEY: atlas_minio
      ATLAS_SESSION_OBJECT_STORE_SECRET_KEY: atlas_minio_password
      ATLAS_SESSION_OBJECT_STORE_BUCKET: atlas-session-artifacts
      ATLAS_SESSION_OBJECT_STORE_SECURE: "false"
      ATLAS_SESSION_OBJECT_STORE_CREATE_BUCKET: "true"
      ATLAS_SESSION_ARTIFACT_AES_KEY_BASE64: YXRsYXMtbG9jYWwtc2Vzc2lvbi1rZXktMzItYnl0ZSE=
      ATLAS_SESSION_ARTIFACT_KEY_VERSION: local-v1
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  fixture-worker:
    build:
      context: ./backend
      target: fixture-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_FIXTURE_TASK_QUEUE: atlas-fixture
      ATLAS_FIXTURE_WORKER_MAX_CONCURRENCY: 8
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: unless-stopped

  task-intent-consumer:
    profiles: ["task-intent-consumer"]
    build:
      context: ./backend
      target: task-intent-consumer
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_TASK_INTENT_CONSUMPTION_ENABLED: ${ATLAS_TASK_INTENT_CONSUMPTION_ENABLED:-false}
      ATLAS_TASK_DISPATCHER_DATABASE_URL: postgresql://atlas_dispatcher:atlas_dispatcher@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TASK_INTENT_TEMPORAL_NAMESPACE: default
      ATLAS_TASK_INTENT_TASK_QUEUE: atlas-task-run
      ATLAS_TASK_INTENT_WORKER_IDENTITY: task-intent-consumer-local
      ATLAS_TASK_INTENT_POLL_INTERVAL_SECONDS: 1
      ATLAS_TASK_INTENT_LEASE_SECONDS: 90
      ATLAS_TASK_INTENT_BATCH_SIZE: 32
      ATLAS_TASK_INTENT_MAX_ATTEMPTS: 8
      ATLAS_TASK_INTENT_RETRY_INITIAL_SECONDS: 5
      ATLAS_TASK_INTENT_RETRY_MAXIMUM_SECONDS: 300
      ATLAS_TASK_INTENT_RPC_ATTEMPTS: 3
      ATLAS_TASK_INTENT_RPC_TIMEOUT_SECONDS: 10
      ATLAS_TASK_INTENT_RPC_RETRY_DELAY_SECONDS: 0.25
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: "no"

volumes:
  atlas-postgres:
  atlas-minio:
