name: atlas-testops

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas_owner
      POSTGRES_PASSWORD: atlas_owner
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas_owner -d atlas"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - atlas-postgres:/var/lib/postgresql
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro

  temporal:
    image: temporalio/temporal:1.8.0
    command: ["server", "start-dev", "--ip", "0.0.0.0", "--ui-ip", "0.0.0.0"]
    ports:
      - "7233:7233"
      - "8233:8233"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health", "--address", "127.0.0.1:7233"]
      interval: 3s
      timeout: 5s
      retries: 30

  minio:
    image: quay.io/minio/minio:RELEASE.2025-06-13T11-33-47Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: atlas_minio
      MINIO_ROOT_PASSWORD: atlas_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 5s
      retries: 20
    volumes:
      - atlas-minio:/data

  auth-session-worker:
    build:
      context: ./backend
      target: auth-session-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_AUTH_SESSION_TASK_QUEUE: atlas-auth-session
      ATLAS_AUTH_SESSION_WORKER_MAX_CONCURRENCY: 4
      ATLAS_SESSION_OBJECT_STORE_ENDPOINT: minio:9000
      ATLAS_SESSION_OBJECT_STORE_ACCESS_KEY: atlas_minio
      ATLAS_SESSION_OBJECT_STORE_SECRET_KEY: atlas_minio_password
      ATLAS_SESSION_OBJECT_STORE_BUCKET: atlas-session-artifacts
      ATLAS_SESSION_OBJECT_STORE_SECURE: "false"
      ATLAS_SESSION_OBJECT_STORE_CREATE_BUCKET: "true"
      ATLAS_SESSION_ARTIFACT_AES_KEY_BASE64: YXRsYXMtbG9jYWwtc2Vzc2lvbi1rZXktMzItYnl0ZSE=
      ATLAS_SESSION_ARTIFACT_KEY_VERSION: local-v1
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  fixture-worker:
    build:
      context: ./backend
      target: fixture-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_FIXTURE_TASK_QUEUE: atlas-fixture
      ATLAS_FIXTURE_WORKER_MAX_CONCURRENCY: 8
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: unless-stopped

  temporal-worker:
    build:
      context: ./backend
      target: temporal-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_TEMPORAL_TASK_QUEUE: atlas-control
      ATLAS_AUTH_SESSION_DISPATCH_ENABLED: "true"
      ATLAS_AUTH_SESSION_TASK_QUEUE: atlas-auth-session
      ATLAS_FIXTURE_DISPATCH_ENABLED: "true"
      ATLAS_FIXTURE_TASK_QUEUE: atlas-fixture
      ATLAS_FIXTURE_ACTIVITY_TIMEOUT_SECONDS: 60
      ATLAS_FIXTURE_CLEANUP_GRACE_SECONDS: 900
      ATLAS_BROWSER_RUNTIME_ENABLED: "true"
      ATLAS_DEBUG_RUN_PREPARATION_ENABLED: "true"
      ATLAS_DEBUG_RUN_PREPARATION_ACTIVITY_TIMEOUT_SECONDS: 360
      ATLAS_BROWSER_RUNTIME_TASK_QUEUE: atlas-browser
      ATLAS_BROWSER_RUNTIME_WORKER_IDENTITY: browser-worker-local
      ATLAS_BROWSER_RUNTIME_ACTIVITY_TIMEOUT_SECONDS: 300
      ATLAS_BROWSER_RUNTIME_HEARTBEAT_TIMEOUT_SECONDS: 20
      ATLAS_BROWSER_RUNTIME_PERMIT_TTL_SECONDS: 420
      ATLAS_BROWSER_RUNTIME_PERMIT_KEY_BASE64: YXRsYXMtbG9jYWwtYnJvd3Nlci1wZXJtaXQta2V5ISE=
      ATLAS_BROWSER_RUNTIME_REQUEST_HMAC_KEY_BASE64: YXRsYXMtbG9jYWwtYnJvd3Nlci1yZXF1ZXN0LWtleSE=
      ATLAS_BROWSER_CONTEXT_ENVELOPE_KEY_BASE64: YXRsYXMtbG9jYWwtY29udGV4dC1rZXktMzJieXRlcyE=
      ATLAS_BROWSER_CONTEXT_ENVELOPE_KEY_VERSION: local-v1
      ATLAS_BROWSER_REVISION: playwright@1.61.0/chromium@149.0.7827.0
      ATLAS_BROWSER_TOOL_CATALOG_REF: tools.local-public-web@1.0.0
      ATLAS_BROWSER_POLICY_BUNDLE_REF: policy.local-public-web@1.0.0
      ATLAS_BROWSER_ALLOWED_ACTIONS: '["open_route","activate","enter_text","keypress","capture_view"]'
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      auth-session-worker:
        condition: service_started
      fixture-worker:
        condition: service_started
    restart: unless-stopped

  browser-worker:
    build:
      context: ./backend
      target: browser-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_BROWSER_RUNTIME_TASK_QUEUE: atlas-browser
      ATLAS_BROWSER_RUNTIME_API_BASE_URL: http://host.docker.internal:${ATLAS_DEV_API_PORT:-8001}
      ATLAS_BROWSER_RUNTIME_WORKER_IDENTITY: browser-worker-local
      ATLAS_BROWSER_RUNTIME_REQUEST_HMAC_KEY_BASE64: YXRsYXMtbG9jYWwtYnJvd3Nlci1yZXF1ZXN0LWtleSE=
      ATLAS_BROWSER_CONTEXT_ENVELOPE_KEY_BASE64: YXRsYXMtbG9jYWwtY29udGV4dC1rZXktMzJieXRlcyE=
      ATLAS_BROWSER_CONTEXT_ENVELOPE_KEY_VERSION: local-v1
      ATLAS_BROWSER_REVISION: playwright@1.61.0/chromium@149.0.7827.0
      ATLAS_BROWSER_TOOL_CATALOG_REF: tools.local-public-web@1.0.0
      ATLAS_BROWSER_POLICY_BUNDLE_REF: policy.local-public-web@1.0.0
      ATLAS_BROWSER_ALLOWED_ACTIONS: '["open_route","activate","enter_text","keypress","capture_view"]'
      ATLAS_BROWSER_AI_MODE: ${ATLAS_BROWSER_AI_MODE:-deterministic}
      ATLAS_BROWSER_AI_API_KEY: ${ATLAS_BROWSER_AI_API_KEY:-}
      ATLAS_BROWSER_AI_MODEL: ${ATLAS_BROWSER_AI_MODEL:-gpt-5.6-sol}
      ATLAS_BROWSER_AI_API_BASE_URL: ${ATLAS_BROWSER_AI_API_BASE_URL:-https://api.openai.com}
      ATLAS_BROWSER_AI_TIMEOUT_SECONDS: ${ATLAS_BROWSER_AI_TIMEOUT_SECONDS:-20}
      ATLAS_SESSION_OBJECT_STORE_ENDPOINT: minio:9000
      ATLAS_SESSION_OBJECT_STORE_ACCESS_KEY: atlas_minio
      ATLAS_SESSION_OBJECT_STORE_SECRET_KEY: atlas_minio_password
      ATLAS_SESSION_OBJECT_STORE_BUCKET: atlas-session-artifacts
      ATLAS_SESSION_OBJECT_STORE_SECURE: "false"
      ATLAS_SESSION_OBJECT_STORE_CREATE_BUCKET: "true"
      ATLAS_SESSION_ARTIFACT_AES_KEY_BASE64: YXRsYXMtbG9jYWwtc2Vzc2lvbi1rZXktMzItYnl0ZSE=
      ATLAS_SESSION_ARTIFACT_KEY_VERSION: local-v1
      ATLAS_EVIDENCE_OBJECT_STORE_ENDPOINT: minio:9000
      ATLAS_EVIDENCE_OBJECT_STORE_ACCESS_KEY: atlas_minio
      ATLAS_EVIDENCE_OBJECT_STORE_SECRET_KEY: atlas_minio_password
      ATLAS_EVIDENCE_OBJECT_STORE_BUCKET: atlas-evidence-artifacts
      ATLAS_EVIDENCE_OBJECT_STORE_SECURE: "false"
      ATLAS_EVIDENCE_OBJECT_STORE_CREATE_BUCKET: "true"
    depends_on:
      temporal:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  task-intent-consumer:
    profiles: ["task-intent-consumer"]
    build:
      context: ./backend
      target: task-intent-consumer
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_TASK_INTENT_CONSUMPTION_ENABLED: ${ATLAS_TASK_INTENT_CONSUMPTION_ENABLED:-false}
      ATLAS_TASK_DISPATCHER_DATABASE_URL: postgresql://atlas_dispatcher:atlas_dispatcher@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TASK_INTENT_TEMPORAL_NAMESPACE: default
      ATLAS_TASK_INTENT_TASK_QUEUE: atlas-task-run
      ATLAS_TASK_INTENT_WORKER_IDENTITY: task-intent-consumer-local
      ATLAS_TASK_INTENT_POLL_INTERVAL_SECONDS: 1
      ATLAS_TASK_INTENT_LEASE_SECONDS: 180
      ATLAS_TASK_INTENT_BATCH_SIZE: 32
      ATLAS_TASK_INTENT_MAX_ATTEMPTS: 8
      ATLAS_TASK_INTENT_RETRY_INITIAL_SECONDS: 5
      ATLAS_TASK_INTENT_RETRY_MAXIMUM_SECONDS: 300
      ATLAS_TASK_INTENT_RPC_ATTEMPTS: 3
      ATLAS_TASK_INTENT_RPC_TIMEOUT_SECONDS: 10
      ATLAS_TASK_INTENT_RPC_RETRY_DELAY_SECONDS: 0.25
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: "no"

  task-worker:
    profiles: ["task-worker"]
    build:
      context: ./backend
      target: task-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_TASK_WORKER_ENABLED: ${ATLAS_TASK_WORKER_ENABLED:-false}
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_TASK_RUN_TASK_QUEUE: atlas-task-run
      ATLAS_TASK_ATTEMPT_TASK_QUEUE: atlas-unit-attempt
      ATLAS_TASK_RUN_WORKER_MAX_CONCURRENCY: 8
      ATLAS_TASK_ATTEMPT_WORKER_MAX_CONCURRENCY: 8
      ATLAS_TASK_EXECUTION_API_BASE_URL: ${ATLAS_TASK_EXECUTION_API_BASE_URL:-}
      ATLAS_TASK_EXECUTION_HMAC_KEY_BASE64: ${ATLAS_TASK_EXECUTION_HMAC_KEY_BASE64:-}
      ATLAS_TASK_EXECUTION_WORKER_IDENTITY: ${ATLAS_TASK_EXECUTION_WORKER_IDENTITY:-task-worker-local}
      ATLAS_TASK_EXECUTION_HTTP_TIMEOUT_SECONDS: ${ATLAS_TASK_EXECUTION_HTTP_TIMEOUT_SECONDS:-120}
      ATLAS_TASK_EXECUTION_CLOCK_SKEW_SECONDS: ${ATLAS_TASK_EXECUTION_CLOCK_SKEW_SECONDS:-30}
      ATLAS_TASK_EXECUTION_RESPONSE_MAXIMUM_BYTES: ${ATLAS_TASK_EXECUTION_RESPONSE_MAXIMUM_BYTES:-16384}
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: "no"

  task-gate-callback-consumer:
    profiles: ["task-gate-callback-consumer"]
    build:
      context: ./backend
      target: task-gate-callback-consumer
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_TASK_GATE_CALLBACK_DELIVERY_ENABLED: ${ATLAS_TASK_GATE_CALLBACK_DELIVERY_ENABLED:-false}
      ATLAS_TASK_DISPATCHER_DATABASE_URL: postgresql://atlas_dispatcher:atlas_dispatcher@postgres:5432/atlas
      ATLAS_TASK_GATE_CALLBACK_URL: ${ATLAS_TASK_GATE_CALLBACK_URL:-}
      ATLAS_TASK_GATE_CALLBACK_HMAC_KEY_BASE64: ${ATLAS_TASK_GATE_CALLBACK_HMAC_KEY_BASE64:-}
      ATLAS_TASK_GATE_CALLBACK_ALLOW_INSECURE_HTTP: ${ATLAS_TASK_GATE_CALLBACK_ALLOW_INSECURE_HTTP:-false}
      ATLAS_TASK_GATE_CALLBACK_WORKER_IDENTITY: task-gate-callback-consumer-local
      ATLAS_TASK_GATE_CALLBACK_POLL_INTERVAL_SECONDS: 1
      ATLAS_TASK_GATE_CALLBACK_LEASE_SECONDS: 30
      ATLAS_TASK_GATE_CALLBACK_BATCH_SIZE: 32
      ATLAS_TASK_GATE_CALLBACK_MAX_ATTEMPTS: 8
      ATLAS_TASK_GATE_CALLBACK_RETRY_INITIAL_SECONDS: 5
      ATLAS_TASK_GATE_CALLBACK_RETRY_MAXIMUM_SECONDS: 300
      ATLAS_TASK_GATE_CALLBACK_HTTP_TIMEOUT_SECONDS: 10
      ATLAS_TASK_GATE_CALLBACK_REPLAY_WINDOW_SECONDS: 300
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  task-schedule-worker:
    profiles: ["task-schedule-worker"]
    build:
      context: ./backend
      target: task-schedule-worker
    environment:
      ATLAS_ENVIRONMENT: local
      ATLAS_TASK_SCHEDULE_WORKER_ENABLED: ${ATLAS_TASK_SCHEDULE_WORKER_ENABLED:-false}
      ATLAS_DATABASE_URL: postgresql://atlas_app:atlas_app@postgres:5432/atlas
      ATLAS_TEMPORAL_ADDRESS: temporal:7233
      ATLAS_TEMPORAL_NAMESPACE: default
      ATLAS_TASK_SCHEDULE_TASK_QUEUE: atlas-task-schedule
      ATLAS_TASK_SCHEDULE_WORKER_MAX_CONCURRENCY: 8
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: "no"

volumes:
  atlas-postgres:
  atlas-minio:
